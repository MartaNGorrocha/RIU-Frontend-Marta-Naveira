<div class="container_ext_table">
  <div class="container_actions">
    <mat-form-field>
      <mat-label>Filtro</mat-label>
      <input matInput [formControl]="filterControl" placeholder="Buscar por alias" #input>
    </mat-form-field>

    <button mat-button="tonal" color="primary" (click)="addHero()">Añadir Heroe</button>
  </div>
  <div class="container_table">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
      <ng-container matColumnDef="alias">
        <th mat-header-cell *matHeaderCellDef>Alias</th>
        <td mat-cell *matCellDef="let element">
          <a title="" [routerLink]="['/heroes', element.id]" class="hero-link">
            {{ element.alias }}
          </a>
        </td>
      </ng-container>
      <ng-container matColumnDef="universe">
        <th mat-header-cell *matHeaderCellDef> Universo </th>
        <td mat-cell *matCellDef="let element"> {{element.universe}} </td>
      </ng-container>
      <ng-container matColumnDef="powerLevel">
        <th mat-header-cell *matHeaderCellDef> Nivel de Poder </th>
        <td mat-cell *matCellDef="let element"> {{element.powerLevel}} </td>
      </ng-container>
      <ng-container matColumnDef="city">
        <th mat-header-cell *matHeaderCellDef> Ciudad </th>
        <td mat-cell *matCellDef="let element"> {{element.city}} </td>
      </ng-container>
      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef> Activo </th>
        <td mat-cell *matCellDef="let element"> {{element.active ? 'Activo' : 'Inactivo'}} </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let element" class="actions-cell">
          <button mat-icon-button color="primary" type="button" aria-label="Editar héroe" (click)="editHero(element)">
            <mat-icon>edit</mat-icon>
          </button>

          <button mat-icon-button color="warn" type="button" aria-label="Eliminar héroe" (click)="deleteHero(element)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow [hidden]="!input.value">
        <td class="mat-cell" colspan="5">No hay resultados para la búsqueda: "{{input.value}}"</td>
      </tr>
    </table>
  </div>
  <div class="container_paginator">
    <mat-paginator class="mat-elevation-z8" [pageSize]="5" [pageSizeOptions]="[5, 10]" showFirstLastButtons>
    </mat-paginator>
  </div>
</div>
