<h2 mat-dialog-title>Confirmar borrado</h2>

<mat-dialog-content>
  <p>¿Seguro que quieres eliminar a <strong>{{ data.alias }}</strong>?</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button type="button" (click)="cancel()">
    Cancelar
  </button>

  <button mat-raised-button color="warn" type="button" (click)="confirm()">
    Eliminar
  </button>
</mat-dialog-actions>
